    <meta name="description"
        content="Shibuya, Tokyo, nhộn nhịp không khí lễ hội Halloween. Một đám cưới được tổ chức ở Shibuya Hikarie, nơi Miwako Sato đang mặc váy cưới. Trong khi Conan và những vị khách được mời khác đang xem, một kẻ tấn công bất ngờ xông vào, và Wataru Takagi, người đang cố gắng bảo vệ Sato, bị thương. Takagi sống sót và tình hình đã ổn, nhưng trong mắt Sato, hình ảnh của thần chết mà cô đã thấy khi Jinpei Matsuda, người đàn ông cô yêu, đã bị giết trong một loạt vụ đánh bom ba năm trước hiện lên

Đồng thời, thủ phạm của các vụ đánh bom đã trốn thoát khỏi nhà tù. Đây thực sự là một sự trùng hợp. Furuya Rei, một thành viên của cảnh sát bảo an, đang truy lùng kẻ đã giết bạn cùng lớp của mình, nhưng một kẻ bí ẩn giả dạng đột nhiên xuất hiện và đặt một quả bom vào cổ của anh ta

Conan đến nơi trú ẩn dưới lòng đất nơi Amuro đang ẩn náu để giải quyết quả bom, và nghe về một sự cố cách đây ba năm khi những người bạn cùng lớp của anh ta đã qua đời ở học viện cảnh sát trong lúc gặp phải một kẻ đánh bom ảo không xác định tên là Plamya ở Shibuya. Khi Conan và nhóm của anh ấy đang điều tra, một bóng đen đáng lo ngại bắt đầu hiện ra trước mặt họ | Mon Fansub là nhóm dịch phim Doraemon được thành lập vào ngày 20/10/2016 với sứ mệnh mang đến cho mọi người những tập phim mới nhất và chất chơi nhất!">
